      <rect class="kvhead" x="496" y="20" width="56" height="54" rx="8"/>
      <rect class="kvhead" x="560" y="20" width="56" height="54" rx="8"/>
      <rect class="kvhead" x="624" y="20" width="56" height="54" rx="8"/>
      <rect class="kvhead" x="688" y="20" width="56" height="54" rx="8"/>
      <rect class="kvhead" x="752" y="20" width="56" height="54" rx="8"/>
      <rect class="kvhead" x="816" y="20" width="56" height="54" rx="8"/>
      <rect class="kvhead" x="880" y="20" width="56" height="54" rx="8"/>
      <rect class="kvhead" x="944" y="20" width="56" height="54" rx="8"/>
      <rect class="kvhead" x="1008" y="20" width="56" height="54" rx="8"/>
    </g>
  </g>

  <g transform="translate(60 435)">
    <rect width="1000" height="80" rx="16" fill="#fff" stroke="#151515" stroke-width="2.2"/>
    <text x="24" y="34" class="mono">Why GQA: each KV head serves a whole group of Qs, shrinking the KV cache proportionally.</text>
    <text x="24" y="60" class="mono">Cache saving vs full multi-head: local layers store 16/32 = 50%; global layers in 31B store 4/32 = 12.5%.</text>
  </g>
</svg>
