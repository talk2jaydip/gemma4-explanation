<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 560" role="img" aria-label="Grouped-Query Attention in Gemma 4: many query heads share fewer key-value heads.">
  <style>
    .scribble{font-family:"Comic Sans MS","Bradley Hand",ui-rounded,cursive}
    .title{font-size:30px;font-weight:900;letter-spacing:-.03em}
    .label{font:700 20px ui-rounded,"Avenir Next",system-ui,sans-serif}
    .tiny{font:500 15px ui-rounded,"Avenir Next",system-ui,sans-serif}
    .mono{font:700 16px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    .flow{fill:none;stroke:#151515;stroke-width:3;stroke-linecap:round;stroke-dasharray:9 7;animation:dash 3s linear infinite}
    .qhead{fill:#e2f1ff;stroke:#151515;stroke-width:2.2}
    .kvhead{fill:#f8e7c9;stroke:#151515;stroke-width:2.5}
    .qhead.active{animation:pulseQ 2.4s ease-in-out infinite}
    .kvhead.active{animation:pulseKV 2.4s ease-in-out infinite}
    @keyframes dash{to{stroke-dashoffset:-120}}
    @keyframes pulseQ{0%,100%{fill:#e2f1ff}50%{fill:#bfd8ee}}
    @keyframes pulseKV{0%,100%{fill:#f8e7c9}50%{fill:#eac790}}
  </style>
  <defs><marker id="ga" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#151515"/></marker></defs>
  <rect x="24" y="24" width="1072" height="512" rx="26" fill="#fffaf0" stroke="#151515" stroke-width="3"/>
  <text x="58" y="70" class="scribble title">Grouped-Query Attention: many askers, fewer answerers</text>
  <text x="58" y="102" class="note tiny">In local layers: 32 Q heads share 16 KV heads -> each KV head answers 2 Qs. In global layers of the 31B: 32 Q heads share 4 KV heads -> each answers 8.</text>

  <g transform="translate(60 145)">
    <text x="0" y="0" class="label">Query heads (32)</text>
    <g id="qRow">
      <rect class="qhead active" x="0" y="20" width="28" height="34" rx="6"/>
      <rect class="qhead active" x="32" y="20" width="28" height="34" rx="6"/>
      <rect class="qhead" x="64" y="20" width="28" height="34" rx="6"/>
      <rect class="qhead" x="96" y="20" width="28" height="34" rx="6"/>
      <rect class="qhead" x="128" y="20" width="28" height="34" rx="6"/>
