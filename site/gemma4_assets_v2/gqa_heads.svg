    <path class="flow" d="M460 210 C460 240 480 265 504 295"/>
    <path class="flow" d="M524 210 C524 240 520 260 522 295"/>
    <path class="flow" d="M588 210 C588 240 610 265 636 295"/>
    <path class="flow" d="M652 210 C652 240 650 260 652 295"/>
    <path class="flow" d="M716 210 C716 240 740 265 768 295"/>
    <path class="flow" d="M780 210 C780 240 780 260 784 295"/>
    <path class="flow" d="M844 210 C844 240 875 265 900 295"/>
    <path class="flow" d="M908 210 C908 240 910 260 914 295"/>
    <path class="flow" d="M972 210 C972 240 1005 265 1030 295"/>
    <path class="flow" d="M1006 210 C1006 240 1020 260 1044 295"/>
  </g>

  <g transform="translate(60 310)">
    <text x="0" y="0" class="label">Key/Value heads (16 in local layers)</text>
    <g>
      <rect class="kvhead active" x="48" y="20" width="56" height="54" rx="8"/>
      <rect class="kvhead" x="112" y="20" width="56" height="54" rx="8"/>
      <rect class="kvhead" x="176" y="20" width="56" height="54" rx="8"/>
