      <rect class="qhead" x="352" y="20" width="28" height="34" rx="6"/>
      <rect class="qhead" x="384" y="20" width="28" height="34" rx="6"/>
      <rect class="qhead" x="416" y="20" width="28" height="34" rx="6"/>
      <rect class="qhead" x="448" y="20" width="28" height="34" rx="6"/>
      <rect class="qhead" x="480" y="20" width="28" height="34" rx="6"/>
      <rect class="qhead" x="512" y="20" width="28" height="34" rx="6"/>
      <rect class="qhead" x="544" y="20" width="28" height="34" rx="6"/>
      <rect class="qhead" x="576" y="20" width="28" height="34" rx="6"/>
      <rect class="qhead" x="608" y="20" width="28" height="34" rx="6"/>
      <rect class="qhead" x="640" y="20" width="28" height="34" rx="6"/>
      <rect class="qhead" x="672" y="20" width="28" height="34" rx="6"/>
      <rect class="qhead" x="704" y="20" width="28" height="34" rx="6"/>
      <rect class="qhead" x="736" y="20" width="28" height="34" rx="6"/>
      <rect class="qhead" x="768" y="20" width="28" height="34" rx="6"/>
      <rect class="qhead" x="800" y="20" width="28" height="34" rx="6"/>
      <rect class="qhead" x="832" y="20" width="28" height="34" rx="6"/>
      <rect class="qhead" x="864" y="20" width="28" height="34" rx="6"/>
      <rect class="qhead" x="896" y="20" width="28" height="34" rx="6"/>
      <rect class="qhead" x="928" y="20" width="28" height="34" rx="6"/>
      <rect class="qhead" x="960" y="20" width="28" height="34" rx="6"/>
      <rect class="qhead" x="992" y="20" width="28" height="34" rx="6"/>
    </g>
  </g>

  <g id="bundles" stroke="#151515" stroke-width="1.8" opacity="0.7" fill="none">
    <path class="flow" d="M76 210 C76 240 85 270 108 295"/>
    <path class="flow" d="M140 210 C140 240 135 270 132 295"/>
    <path class="flow" d="M204 210 C204 240 220 265 240 295"/>
    <path class="flow" d="M268 210 C268 240 260 260 260 295"/>
    <path class="flow" d="M332 210 C332 240 350 265 372 295"/>
