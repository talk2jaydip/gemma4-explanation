<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" role="img" aria-label="Hybrid attention: mostly sliding windows with periodic global layers.">
  <defs><marker id="arrow2" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#151515"/></marker></defs>
  <rect x="25" y="25" width="1050" height="470" rx="26" fill="#fffaf0" stroke="#151515" stroke-width="3"/>
  <text x="55" y="70" class="scribble title">Hybrid attention: cheap local sight, occasional full memory</text>
  <text x="55" y="102" class="note">Five nearby-reader layers can be followed by a global-reader layer in public configs; the final layer is global.</text>

  <g transform="translate(70 150)">
    <text x="0" y="-18" class="label">Sliding attention layer</text>
    <line x1="0" y1="60" x2="820" y2="60" stroke="#151515" stroke-width="3" stroke-linecap="round"/>
    <g class="tokens">
      <circle cx="20" cy="60" r="10"/><circle cx="80" cy="60" r="10"/><circle cx="140" cy="60" r="10"/><circle cx="200" cy="60" r="10"/><circle cx="260" cy="60" r="10"/><circle cx="320" cy="60" r="10"/><circle cx="380" cy="60" r="10"/><circle cx="440" cy="60" r="10"/><circle cx="500" cy="60" r="10"/><circle cx="560" cy="60" r="10"/><circle cx="620" cy="60" r="10"/><circle cx="680" cy="60" r="10"/><circle cx="740" cy="60" r="10"/><circle cx="800" cy="60" r="10"/>
    </g>
    <rect class="window" x="75" y="20" width="250" height="80" rx="15" fill="#e2f1ff" fill-opacity="0.55" stroke="#151515" stroke-width="2.2" stroke-dasharray="8 7">
      <animate attributeName="x" values="15;310;550;15" dur="8s" repeatCount="indefinite"/>
    </rect>
    <text x="860" y="48" class="tiny">each token sees</text>
    <text x="860" y="70" class="tiny">only a window</text>
  </g>

  <g transform="translate(70 320)">
    <text x="0" y="-18" class="label">Global attention layer</text>
    <line x1="0" y1="60" x2="820" y2="60" stroke="#151515" stroke-width="3" stroke-linecap="round"/>
    <g class="tokens">
      <circle cx="20" cy="60" r="10"/><circle cx="80" cy="60" r="10"/><circle cx="140" cy="60" r="10"/><circle cx="200" cy="60" r="10"/><circle cx="260" cy="60" r="10"/><circle cx="320" cy="60" r="10"/><circle cx="380" cy="60" r="10"/><circle cx="440" cy="60" r="10"/><circle cx="500" cy="60" r="10"/><circle cx="560" cy="60" r="10"/><circle cx="620" cy="60" r="10"/><circle cx="680" cy="60" r="10"/><circle cx="740" cy="60" r="10"/><circle cx="800" cy="60" r="10"/>
    </g>
    <path class="arc a1" d="M20 52 C120 -30 700 -30 800 52"/>
    <path class="arc a2" d="M80 52 C170 10 590 10 680 52"/>
    <path class="arc a3" d="M260 52 C350 0 470 0 560 52"/>
    <text x="860" y="50" class="tiny">long links refresh</text>
    <text x="860" y="72" class="tiny">the whole context</text>
  </g>
</svg>